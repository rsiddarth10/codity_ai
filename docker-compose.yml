# Postgres (+ Adminer), plus the worker and scheduler services.
# API and frontend services are added in later phases.
#
# Run migrations once before starting workers:  npm run migrate:up
# Scale workers horizontally:  docker compose up -d --scale worker=3
services:
  postgres:
    image: postgres:16-alpine
    container_name: codity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codity}
      POSTGRES_DB: ${POSTGRES_DB:-codity}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codity} -d ${POSTGRES_DB:-codity}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: codity-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  api:
    build: .
    container_name: codity-api
    restart: unless-stopped
    init: true
    command: ["node", "--import", "tsx", "packages/api/src/main.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-codity}:${POSTGRES_PASSWORD:-codity}@postgres:5432/${POSTGRES_DB:-codity}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      API_PORT: 4000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    # node is the direct process (PID 1 under tini) so SIGTERM from `docker stop` reaches
    # our shutdown handler and in-flight jobs drain. `init: true` runs tini to forward it.
    init: true
    command: ["node", "--import", "tsx", "packages/worker/src/main.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-codity}:${POSTGRES_PASSWORD:-codity}@postgres:5432/${POSTGRES_DB:-codity}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      # WORKER_QUEUES unset => discover and poll all queues.
    depends_on:
      postgres:
        condition: service_healthy
    # Graceful shutdown: give in-flight jobs time to drain on `docker stop`.
    stop_grace_period: 30s

  scheduler:
    build: .
    container_name: codity-scheduler
    restart: unless-stopped
    init: true
    command: ["node", "--import", "tsx", "packages/scheduler/src/main.ts"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-codity}:${POSTGRES_PASSWORD:-codity}@postgres:5432/${POSTGRES_DB:-codity}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Baked into the bundle at build time. The browser (on the host) reaches the API
        # via its published port, so localhost:4000 works for the default setup.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: codity-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  pgdata:
