# Phase 1 brings up Postgres (+ Adminer for inspection).
# API / worker / scheduler / frontend services are added in later phases.
services:
  postgres:
    image: postgres:16-alpine
    container_name: codity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codity}
      POSTGRES_DB: ${POSTGRES_DB:-codity}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codity} -d ${POSTGRES_DB:-codity}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: codity-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata:
